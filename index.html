}

// ── Story Viewer Modal ──
function StoryViewer({friends,startIdx,onClose,onToast}) {
  const [idx,setIdx]=useState(startIdx);
  const [paused,setPaused]=useState(false);
  const [key,setKey]=useState(0);
  const f=friends[idx];

  const next=useCallback(()=>{
    if(idx<friends.length-1){setIdx(i=>i+1);setKey(k=>k+1);}
    else onClose();
  },[idx,friends.length,onClose]);

  const prev=()=>{if(idx>0){setIdx(i=>i-1);setKey(k=>k+1);}};

  useEffect(()=>{
    if(paused) return;
    const t=setTimeout(next,6000);
    return()=>clearTimeout(t);
  },[idx,paused,next,key]);

  useEffect(()=>{
    const handler=(e)=>{
      if(e.key==="ArrowRight") next();
      if(e.key==="ArrowLeft") prev();
      if(e.key==="Escape") onClose();
    };
    window.addEventListener("keydown",handler);
    return()=>window.removeEventListener("keydown",handler);
  });

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.95)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      {/* Progress bars */}
      <div style={{position:"absolute",top:0,left:0,right:0,display:"flex",gap:3,padding:"12px 16px",zIndex:2}}>
        {friends.map((fr,i)=>(
          <div key={fr.id} style={{flex:1,height:3,background:"rgba(255,255,255,0.2)",borderRadius:2,overflow:"hidden"}}>
            {i<idx&&<div style={{height:"100%",width:"100%",background:"#fff"}}/>}

            {f.recent.map((t,i)=>(
              <div key={i} style={{fontSize:11,color:$.t2,padding:"4px 0",display:"flex",gap:6}}><span style={{color:$.g}}>♫</span>{t}</div>
            ))}
          </div>
          {/* Actions */}
          <div style={{display:"flex",gap:8,padding:"0 20px 20px"}}>
            <button onClick={()=>onToast("❤️ Reacted!")} style={{flex:1,background:"rgba(220,38,38,0.12)",border:"1px solid rgba(220,38,38,0.2)",borderRadius:10,padding:"10px",color:"#ef4444",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:font}}>❤️ React</button>

          </div>
        </div>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:$.t3}}>
          {idx+1} / {friends.length} · {idx<friends.length-1?"Tap right or wait 6s for next →":"Last story"} · ← → keys work too
        </div>
      </div>
    </div>
  );
}

// ── Smart AI Chat ──
function SmartAiChat() {
  const [msgs,setMsgs]=useState([]);
  const [inp,setInp]=useState("");
  const [typing,setTyping]=useState(false);
  const ref=useRef(null);
  const sugg=["What are my friends discovering?","Create a blend with Priya","Who should I listen with today?","Why is Sneha's match only 45%?"];

  function send(t) {
    if(!t.trim()) return;
    const nm=[...msgs,{role:"user",content:t}];
    setMsgs(nm);setInp("");setTyping(true);
    setTimeout(()=>{
      setMsgs([...nm,{role:"assistant",content:getAIReply(t)}]);
      setTyping(false);
    },900+Math.random()*600);
  }
  useEffect(()=>{ref.current&&(ref.current.scrollTop=ref.current.scrollHeight);},[msgs,typing]);

  return (
    <Box style={{padding:0,overflow:"hidden",display:"flex",flexDirection:"column",height:400}}>
      <div style={{padding:"10px 14px",borderBottom:`1px solid ${$.bd}`,display:"flex",alignItems:"center",gap:8,background:$.g+"08"}}>
        <div style={{width:26,height:26,borderRadius:6,background:$.g,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🎵</div>
        <div><div style={{fontSize:12,fontWeight:700}}>Taste Match Engine</div><div style={{fontSize:9,color:$.g}}>Social music AI · live demo</div></div>
      </div>
      <div ref={ref} style={{flex:1,overflowY:"auto",padding:10,display:"flex",flexDirection:"column",gap:6}}>
        {msgs.length===0&&(
          <div style={{flex:1,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",gap:8,padding:12}}>
            <div style={{fontSize:24}}>🎵</div>
            <div style={{fontSize:11,color:$.t2,textAlign:"center",maxWidth:200,lineHeight:1.45}}>Ask about friends' taste, get social music insights</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4,justifyContent:"center",maxWidth:300}}>
              {sugg.map((s,i)=><button key={i} onClick={()=>send(s)} style={{background:$.sf,border:`1px solid ${$.g}12`,borderRadius:12,padding:"4px 10px",fontSize:10,color:$.t2,cursor:"pointer",fontFamily:font}}>{s}</button>)}
            </div>
          </div>
        )}
        {msgs.map((m,i)=><div key={i} style={{alignSelf:m.role==="user"?"flex-end":"flex-start",maxWidth:"82%",background:m.role==="user"?$.g:"#252525",color:m.role==="user"?"#000":$.t1,borderRadius:10,borderBottomRightRadius:m.role==="user"?2:10,borderBottomLeftRadius:m.role==="assistant"?2:10,padding:"7px 11px",fontSize:11,lineHeight:1.45}}>{m.content}</div>)}
        {typing&&<div style={{alignSelf:"flex-start",background:"#252525",borderRadius:10,borderBottomLeftRadius:2,padding:"9px 12px",display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:$.g,animation:`dot 1s ease ${i*0.15}s infinite`}}/>)}</div>}
      </div>
      <div style={{padding:"6px 8px",borderTop:`1px solid ${$.bd}`,display:"flex",gap:6}}>
        <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(inp)} placeholder="Ask about friends' music..." style={{flex:1,background:"#252525",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,color:$.t1,outline:"none",fontFamily:font}}/>
        <button onClick={()=>send(inp)} style={{background:inp.trim()?$.g:"#252525",border:"none",borderRadius:8,width:30,height:30,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:inp.trim()?"#000":$.t3,fontWeight:700}}>↑</button>
      </div>
    </Box>
  );
}

// ── Create Soundbite form ──
function CreateSoundbite({onPost}) {
  const [open,setOpen]=useState(false);
  const [song,setSong]=useState("");
  const [cap,setCap]=useState("");
  function post(){
    if(!song.trim()) return;
    onPost({song:song.trim(),cap:cap.trim()||"Just discovered this 🎵"});
    setSong("");setCap("");setOpen(false);
  }
  return (
    <div style={{marginBottom:18}}>
      {!open?(
        <button onClick={()=>setOpen(true)} style={{width:"100%",background:$.g+"10",border:`1.5px dashed ${$.g}40`,borderRadius:12,padding:"12px",fontSize:12,color:$.g,fontWeight:600,cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
          <span style={{fontSize:18}}>+</span> Share your own soundbite
        </button>
      ):(
        <Box glow style={{animation:"fadeUp 0.2s ease"}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:12,color:$.g}}>📤 Share a Soundbite</div>
          <input value={song} onChange={e=>setSong(e.target.value)} placeholder="Song name — Artist" style={{width:"100%",background:$.sf,border:`1px solid ${$.bd}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:$.t1,outline:"none",fontFamily:font,marginBottom:8}}/>
          <input value={cap} onChange={e=>setCap(e.target.value)} placeholder="Add a caption..." style={{width:"100%",background:$.sf,border:`1px solid ${$.bd}`,borderRadius:8,padding:"8px 12px",fontSize:12,color:$.t1,outline:"none",fontFamily:font,marginBottom:10}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={post} style={{flex:1,background:$.g,color:"#000",border:"none",borderRadius:8,padding:"9px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:font}}>Post Soundbite</button>
            <button onClick={()=>setOpen(false)} style={{background:"transparent",border:`1px solid ${$.bd}`,borderRadius:8,padding:"9px 14px",fontSize:12,color:$.t3,cursor:"pointer",fontFamily:font}}>Cancel</button>
          </div>
        </Box>
      )}
    </div>
  );
}

function App() {
  const [tab,setTab]=useState("proto");
  const [liked,setLiked]=useState({});
  const [playing,setPlaying]=useState(null);
  const [playProg,setPlayProg]=useState({});
  const [storyOpen,setStoryOpen]=useState(false);
  const [storyStart,setStoryStart]=useState(0);
  const [seen,setSeen]=useState(new Set());
  const [toast,setToast]=useState(null);
  const [myPosts,setMyPosts]=useState([]);
  const [expandChip,setExpandChip]=useState(null);
  const progRef=useRef({});

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),2500);}

  function openStory(i){setStoryStart(i);setStoryOpen(true);}
  function closeStory(){
    setSeen(s=>{const n=new Set(s);for(let i=0;i<=storyStart;i++)n.add(i);return n;});
    setStoryOpen(false);
  }

  function togglePlay(id){
    if(playing===id){progRef.current[id]=0;setPlaying(null);setPlayProg(p=>({...p,[id]:0}));}
    else{setPlaying(id);}
  }

  useEffect(()=>{
    if(playing===null) return;
    const iv=setInterval(()=>{
      progRef.current[playing]=(progRef.current[playing]||0)+0.55;
      if(progRef.current[playing]>=100){progRef.current[playing]=0;setPlaying(null);}
      setPlayProg({...progRef.current});
    },100);
    return()=>clearInterval(iv);
  },[playing]);

  function addPost(p){
    setMyPosts(posts=>[{id:`my-${Date.now()}`,name:"You",av:"🎤",match:100,song:p.song.split("—")[0]?.trim()||p.song,artist:p.song.split("—")[1]?.trim()||"",genres:["Your pick"],mood:"Fresh",time:"Just now",cap:p.cap,range:"0:00 – 0:30",tag:"Your post",tc:$.g,likes:0,recent:[],overlap:"This is your new soundbite.",isMe:true},...posts]);
    showToast("✓ Soundbite posted to your circle!");
  }

  const CHIPS=[
    {k:"priya",t:"🧬 You & Priya: 87% taste match",c:$.g,detail:"You both love Anuv Jain, Ritviz, and late-night lo-fi. Priya discovers indie-pop artists ~2 weeks before they hit your Discover Weekly. She's your most valuable discovery signal."},
    {k:"trending",t:"🔥 Anuv Jain trending in your circle",c:"#D97706",detail:"3 of 4 friends played Anuv Jain this week. Priya started it 4 days ago with a soundbite. Rohan picked it up the next day. This is the social flywheel working — friend discovery spreading through your network."},
    {k:"lofi",t:"💡 You're under-exposed to Lo-fi — friends listen 3×",c:"#2563EB",detail:"Priya and Sneha listen to 3× more lo-fi than you, despite your overlap in indie-pop. The algorithm hasn't bridged this gap. Priya's soundbites are your fastest route in."},
  ];

  return (
    <div style={{minHeight:"100vh",background:$.bg,color:$.t1,fontFamily:font,paddingBottom:playing?80:0}}>

      {/* ══ HEADER ══ */}
      <div style={{borderBottom:`1px solid ${$.bd}`,background:`linear-gradient(180deg,${$.g}06,transparent 70%)`}}>
        <div style={{maxWidth:980,margin:"0 auto",padding:"28px 24px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:$.g,boxShadow:`0 0 8px ${$.g}`}}/>
            <span style={{fontSize:9,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:$.g}}>Product Case Study · Interactive Prototype</span>
          </div>
          <h1 style={{fontSize:28,fontWeight:900,letterSpacing:-0.8,marginBottom:4}}>Spotify Socials</h1>
          <p style={{fontSize:13,color:$.t2,maxWidth:500,lineHeight:1.45,marginBottom:14}}>Turning Spotify's social graph and listening data into an AI-powered music discovery engine — driven by friends, not just algorithms.</p>
          <div style={{display:"flex",gap:3,background:$.sf,borderRadius:9,padding:3,maxWidth:300}}>
            {[{id:"proto",l:"📱 Prototype"},{id:"case",l:"📋 Case Study"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"7px 12px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:font,background:tab===t.id?$.cd:"transparent",color:tab===t.id?$.t1:$.t3,fontSize:12,fontWeight:600,transition:"all .15s"}}>{t.l}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:980,margin:"0 auto",padding:"24px 24px 60px"}}>

            {/* Taste profiles */}
            <Heading tag="Your Circle" title="Taste Match Profiles" desc="Cosine similarity between your listening vector and each friend's. Recalculated hourly." />
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {FRIENDS.map(f=>(
                <Box key={f.id} style={{textAlign:"center",cursor:"pointer"}} onClick={()=>openStory(FRIENDS.findIndex(fr=>fr.id===f.id))}>
                  <div style={{width:36,height:36,borderRadius:"50%",background:$.g+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,margin:"0 auto 5px"}}>{f.av}</div>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{f.name}</div>
                  <Ring pct={f.match} sz={36}/>
                  <div style={{fontSize:9,color:$.t3,marginTop:3}}>{f.mood}</div>
                  <div style={{fontSize:10,color:$.t2,marginTop:4}}>♫ {f.song}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:3,justifyContent:"center",marginTop:5}}>
                    {f.genres.map(g=><Pill key={g}>{g}</Pill>)}
                  </div>
                </Box>
              ))}
            </div>
          </div>
        )}

        {/* ═══════════════════════════════════
            CASE STUDY TAB
            ═══════════════════════════════════ */}
        {tab==="case"&&(<div>

          <Heading tag="The Problem" title="Spotify has the data. Users have the desire. The connection is missing." />
          <Box glow style={{marginBottom:14}}>
            <p style={{fontSize:15,fontWeight:700,color:$.g,lineHeight:1.45,marginBottom:10}}>{PROBLEM.statement}</p>
            <p style={{fontSize:12,color:$.t2,lineHeight:1.55}}>{PROBLEM.context}</p>
          </Box>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
            {PROBLEM.issues.map((iss,i)=>(
              <Box key={i} style={{display:"flex",gap:12}}>
                <div style={{width:26,height:26,borderRadius:6,background:"#DC262615",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:"#DC2626",flexShrink:0}}>{i+1}</div>
                <div><div style={{fontSize:13,fontWeight:600,marginBottom:2}}>{iss.point}</div><div style={{fontSize:12,color:$.t2,lineHeight:1.5}}>{iss.detail}</div></div>
              </Box>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:6}}>
            <Box><div style={{fontSize:11,fontWeight:700,color:$.g,marginBottom:8}}>Value for Users</div>{PROBLEM.value.customer.map((v,i)=><div key={i} style={{fontSize:11,color:$.t2,marginBottom:3,display:"flex",gap:5}}><span style={{color:$.g}}>→</span>{v}</div>)}</Box>
            <Box><div style={{fontSize:11,fontWeight:700,color:"#D97706",marginBottom:8}}>Value for Business</div>{PROBLEM.value.business.map((v,i)=><div key={i} style={{fontSize:11,color:$.t2,marginBottom:3,display:"flex",gap:5}}><span style={{color:"#D97706"}}>→</span>{v}</div>)}</Box>
          </div>
          <Box style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:11,fontWeight:700}}>Goal:</span>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <Pill>{PROBLEM.goal.primary}</Pill><span style={{color:$.t3}}>→</span><Pill color="#D97706">{PROBLEM.goal.secondary}</Pill><span style={{color:$.t3}}>→</span><Pill color="#2563EB">{PROBLEM.goal.outcome}</Pill>
            </div>
          </Box>

          <Divider/>

          <Heading tag="Research Validation" title="72 respondents + 10 user interviews confirmed the problem is real"/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:7,marginBottom:14}}>
            {SURVEY.map((s,i)=><Box key={i} style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:$.g}}>{s.stat}</div><div style={{fontSize:9,color:$.t2,marginTop:2,lineHeight:1.3}}>{s.text}</div></Box>)}
          </div>
          <div style={{display:"flex",gap:7,marginBottom:6}}>
            {MARKET.funnel.map((m,i)=>(
              <Box key={i} style={{flex:1,textAlign:"center",position:"relative"}}>
                <div style={{fontSize:18,fontWeight:800}}>{m.val}</div>
                <div style={{fontSize:9,color:$.t3,marginTop:1}}>{m.label}</div>
                {m.sub&&<div style={{fontSize:8,color:$.g,marginTop:1}}>{m.sub}</div>}
                {i<3&&<span style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",color:$.t3,fontSize:10}}>→</span>}
              </Box>
            ))}
          </div>
          <Box style={{fontSize:11,color:$.t2,marginBottom:10}}>Platform: <b style={{color:$.t1}}>{MARKET.platform.users}</b> existing users — {MARKET.platform.note}</Box>

          <Divider/>

          <Heading tag="Why Now" title="The window is open — and it won't stay open long"/>
          <Box style={{marginBottom:10}}>
            {WHY_NOW.map((w,i)=><div key={i} style={{fontSize:12,color:$.t2,lineHeight:1.5,padding:"4px 0",display:"flex",gap:8}}><span style={{color:$.g,fontWeight:700,flexShrink:0}}>{i+1}.</span>{w}</div>)}
          </Box>

          <Divider/>

          <Heading tag="User Segments" title="Three distinct segments — one primary driver" desc="Segmented by relationship with music and social sharing behavior. Primary segment chosen by content creation potential and network effect leverage."/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
            {SEGMENTS.map((seg,i)=>(
              <Box key={i} glow={i===SEG_PRIORITY.winner}>
                {i===SEG_PRIORITY.winner&&<div style={{fontSize:8,fontWeight:700,color:$.g,letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>⭐ Primary Segment</div>}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                  <div style={{width:32,height:32,borderRadius:"50%",background:seg.color+"16",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{seg.icon}</div>
                  <div><div style={{fontSize:13,fontWeight:700}}>{seg.name}</div><div style={{fontSize:9,color:$.t3}}>{seg.age} · {seg.role}</div></div>
                </div>
                <p style={{fontSize:11,color:$.t2,lineHeight:1.4,marginBottom:8}}>{seg.who}</p>
                <div style={{fontSize:9,fontWeight:700,marginBottom:3}}>Goals</div>
                {seg.goals.map((g,j)=><div key={j} style={{fontSize:10,color:$.t2,marginBottom:1,display:"flex",gap:4}}><span style={{color:$.g}}>→</span>{g}</div>)}
                <div style={{fontSize:9,fontWeight:700,marginTop:6,marginBottom:3}}>Needs</div>
                {seg.needs.map((n,j)=><div key={j} style={{fontSize:10,color:$.t2,marginBottom:1,display:"flex",gap:4}}><span style={{color:"#2563EB"}}>→</span>{n}</div>)}
                <div style={{fontSize:9,fontWeight:700,marginTop:6,marginBottom:3,color:"#DC2626"}}>Frustrations</div>
                {seg.frustrations.map((f,j)=>(
                  <div key={j} style={{fontSize:10,color:$.t2,marginBottom:3,display:"flex",gap:4,alignItems:"flex-start"}}>
                    <span style={{color:"#DC2626",flexShrink:0}}>•</span>
                    <div>{f.pain} <span style={{fontSize:9,color:$.t3}}>({f.severity} · {f.freq})</span></div>
                  </div>
                ))}
              </Box>
            ))}
          </div>

          <Heading tag="Segment Prioritization" title={`Why "${SEGMENTS[SEG_PRIORITY.winner].name}" drives the strategy`}/>
          <Box glow>
            {SEG_PRIORITY.why.map((w,i)=><div key={i} style={{fontSize:12,color:$.t2,lineHeight:1.5,padding:"3px 0",display:"flex",gap:8}}><span style={{color:$.g,fontWeight:700,flexShrink:0}}>{i+1}.</span>{w}</div>)}
          </Box>

          <Divider/>

          <Heading tag="Pain Prioritization" title="Impact × Frequency × Solvability" desc="The top pain — no way to share and receive discoveries within Spotify — directly determines the solution."/>
          <div style={{display:"flex",flexDirection:"column",gap:7}}>
            {PAINS.map((p,i)=>(
              <Box key={i} glow={i===0} style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{width:26,height:26,borderRadius:7,background:i===0?$.g+"18":$.sf,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,color:i===0?$.g:$.t3,flexShrink:0}}>#{i+1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,marginBottom:2}}>{p.pain}</div>
                  <div style={{display:"flex",gap:8,fontSize:10,color:$.t3}}>
                    <span>Impact <b style={{color:$.t1}}>{p.impact}/5</b></span>
                    <span>Freq <b style={{color:$.t1}}>{p.freq}/5</b></span>
                    <span>Solve <b style={{color:$.t1}}>{p.solve}/5</b></span>
                  </div>
                </div>
                <Ring pct={p.score} sz={38}/>
              </Box>
            ))}
          </div>

          <Divider/>

          <Heading tag="Solutions" title="Three approaches evaluated — one clear winner" desc="Scored using (Reach × Impact × Confidence) / Effort. Soundbite Stories wins at 100% — highest impact with medium effort."/>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
            {SOLUTIONS.map((sol,i)=>(
              <Box key={i} glow={sol.winner}>
                {sol.winner?<div style={{fontSize:8,fontWeight:700,color:$.g,letterSpacing:1.5,marginBottom:4}}>🏆 WINNER — RICE {sol.score}</div>:<div style={{fontSize:8,color:$.t3,marginBottom:4}}>RICE {sol.score}</div>}
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}><span style={{fontSize:17}}>{sol.icon}</span><div style={{fontSize:14,fontWeight:700}}>{sol.name}</div></div>
                <p style={{fontSize:11,color:$.t2,lineHeight:1.4,marginBottom:8}}>{sol.what}</p>
                {[{l:"Reach",d:sol.rice.reach},{l:"Impact",d:sol.rice.impact},{l:"Confidence",d:sol.rice.confidence},{l:"Effort",d:sol.rice.effort}].map((r,j)=>(
                  <div key={j} style={{fontSize:10,marginBottom:2}}><span style={{color:$.t3}}>{r.l}:</span> <b>{r.d.val}</b> <span style={{color:$.t3,fontSize:9}}>— {r.d.why}</span></div>
                ))}
                {sol.winner&&sol.how.length>0&&(
                  <div style={{borderTop:`1px solid ${$.bd}`,paddingTop:7,marginTop:8,marginBottom:6}}>
                    <div style={{fontSize:9,fontWeight:700,marginBottom:4}}>User Flow</div>
                    {sol.how.map((h,j)=><div key={j} style={{fontSize:10,color:$.t2,marginBottom:1,display:"flex",gap:4}}><span style={{color:$.g,fontWeight:700}}>{j+1}.</span>{h}</div>)}
                  </div>
                )}
                <div style={{borderTop:`1px solid ${$.bd}`,paddingTop:7,marginTop:6}}>
                  <div style={{fontSize:9,fontWeight:700,marginBottom:4}}>Expected Results</div>
                  {sol.results.map((r,j)=><div key={j} style={{fontSize:10,color:$.t2,marginBottom:1,display:"flex",gap:4}}><span style={{color:$.g}}>✓</span>{r}</div>)}
                </div>
              </Box>
            ))}
          </div>

          <Divider/>

          <Heading tag="Desirability Validation" title="Landing page test confirmed demand before building" desc={VALIDATION.method}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <Box>
              <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>Conversion Funnel</div>
              {VALIDATION.funnel.map((f,i)=>(
                <div key={i} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontSize:11,fontWeight:600}}>{f.stage}</span><span style={{fontSize:11,color:$.g,fontWeight:700}}>{f.n}</span></div>
                  <div style={{height:5,background:$.sf,borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${(f.n/378)*100}%`,background:$.g,borderRadius:3}}/></div>
                  {f.rate&&<div style={{fontSize:9,color:$.t3,marginTop:1}}>↓ {f.rate}</div>}
                </div>
              ))}
              <div style={{marginTop:6,padding:8,background:$.g+"0A",borderRadius:7,fontSize:11,color:$.g,fontWeight:600,textAlign:"center"}}>24.36% conversion = strong desirability signal</div>
            </Box>
            <div>
              <Box style={{marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:8}}>Analytics</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:5}}>
                  {VALIDATION.analytics.map((a,i)=><div key={i} style={{background:$.sf,borderRadius:5,padding:6,textAlign:"center"}}><div style={{fontSize:13,fontWeight:700}}>{a.v}</div><div style={{fontSize:8,color:$.t3,marginTop:1}}>{a.l}</div></div>)}
                </div>
              </Box>
              <Box><p style={{fontSize:11,color:$.t2,lineHeight:1.5}}>{VALIDATION.verdict}</p></Box>
            </div>
          </div>

          <Divider/>

          <Heading tag="Success Metrics" title="HEART Framework"/>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:24}}>
            {METRICS.map((m,i)=>(
              <Box key={i} style={{display:"grid",gridTemplateColumns:"75px 1fr 1fr 1.8fr",gap:10,alignItems:"center"}}>
                <Pill>{m.cat}</Pill>
                <div><div style={{fontSize:8,color:$.t3}}>Goal</div><div style={{fontSize:11,color:$.t2}}>{m.goal}</div></div>
                <div><div style={{fontSize:8,color:$.t3}}>Signals</div><div style={{fontSize:10,color:$.t2}}>{m.signal}</div></div>
                <div><div style={{fontSize:8,color:$.t3}}>Metrics</div><div style={{fontSize:10,color:$.t2}}>{m.metric}</div></div>
              </Box>
            ))}
          </div>

          <Heading tag="Risks & Mitigation" title="What could go wrong"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:32}}>
            {RISKS.map((r,i)=>(
              <Box key={i}>
                <div style={{fontSize:11,fontWeight:600,color:"#DC2626",marginBottom:4}}>⚠ {r.risk}</div>
                <div style={{fontSize:11,color:$.t2,display:"flex",gap:4}}><span style={{color:$.g}}>✓</span>{r.fix}</div>
              </Box>
            ))}
          </div>

          <Heading tag="Live AI Demo" title="Taste Match Engine" desc="Ask about friends' music taste, discover insights, and see how the social music intelligence layer would work in production."/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
            <SmartAiChat/>
            <Box>
              <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>How the AI layer works</div>
              {[
                {n:"1",t:"Listening Data Ingestion",d:"Real-time stream of plays, skips, repeats, saves, time-of-day patterns",col:"#2563EB"},
                {n:"2",t:"Taste Vector Embedding",d:"Each user's history becomes a vector. Cosine similarity = Taste Match %",col:"#7C3AED"},
                {n:"3",t:"Social Music Graph",d:"Friend connections + taste vectors reveal clusters, trends in your circle",col:"#D97706"},
                {n:"4",t:"Smart Soundbite Selection",d:"Audio analysis identifies the most engaging 30-sec segment — the hook, drop, bridge",col:"#DC2626"},
                {n:"5",t:"Feed Ranking & Insights",d:"Stories ranked by taste match + novelty. AI generates plain-language insights explaining why",col:$.g},
              ].map((a,i)=>(
                <div key={i} style={{display:"flex",gap:8,marginBottom:10}}>
                  <div style={{width:22,height:22,borderRadius:5,background:a.col+"14",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:a.col,flexShrink:0}}>{a.n}</div>
                  <div><div style={{fontSize:11,fontWeight:600,marginBottom:1}}>{a.t}</div><div style={{fontSize:10,color:$.t2,lineHeight:1.4}}>{a.d}</div></div>
                </div>
              ))}
            </Box>
          </div>

        </div>)}
      </div>

      <div style={{borderTop:`1px solid ${$.bd}`,padding:"12px 24px",textAlign:"center"}}>
        <div style={{fontSize:9,color:$.t3}}>Spotify Socials · Product Case Study & Interactive Prototype · Nextleap APM Fellowship 2023</div>
      </div>

      {/* Overlays */}
      {storyOpen&&<StoryViewer friends={FRIENDS} startIdx={storyStart} onClose={closeStory} onToast={showToast}/>}
      <MiniPlayer friend={FRIENDS.find(f=>f.id===playing)} progress={playProg[playing]||0} onPause={()=>{progRef.current[playing]=0;setPlaying(null);setPlayProg(p=>({...p,[playing]:0}));}}/>
      <Toast msg={toast}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
